#
# agent-plugins — archetype for an agent plugin or marketplace repo (skills):
# markdown-lib's prose + license surface plus the evolve eval suite. evolve
# reads its .evolve.{yaml,json,jsonc} at the repo root and is task-scoped on
# {{vars.evolve_version}} — "latest" by default, override in the repo's
# [vars] to pin — so the binary lands in each task's environment without ever
# touching the activated PATH (see the library config header for the full
# rationale).
#
# The eval tiers keep their old Makefile names (triggers/evals/all/report) and
# default to --new --modified: full runs are LLM-priced, so the sweep is
# opt-in via `evolve` directly rather than a task default.
#
# The plugin/marketplace lint extras live here too: plugin-validate runs
# `claude plugin validate` with a task-scoped claude CLI
# (aqua:anthropics/claude-code on {{vars.claude_code_version}} — no npm
# bootstrap, and never on the activated PATH where it would shadow the
# developer's own claude), fixture-json checks every eval fixture parses with
# the pinned node, and installer-syntax parses a root install.sh where one
# exists.

[evolve-checks]
hide = true
dir = "{{config_root}}"
tools = { "github:bitwise-media-group/evolve" = "{{vars.evolve_version}}" }
run = "evolve run checks --strict"

[plugin-validate]
hide = true
dir = "{{config_root}}"
tools = { "aqua:anthropics/claude-code" = "{{vars.claude_code_version}}" }
run = "claude plugin validate ."

[fixture-json]
hide = true
dir = "{{config_root}}"
run = """
set -eu
for f in plugins/*/evals/*/*.json; do
  [ -e "$f" ] || continue
  node -e 'JSON.parse(require("fs").readFileSync(process.argv[1]))' "$f" \
    || { echo "invalid JSON: $f"; exit 1; }
done
"""

[installer-syntax]
hide = true
dir = "{{config_root}}"
run = "if [ -f install.sh ]; then sh -n install.sh; fi"

[fmt]
description = "format prose, inject license headers"
run = [{ task = "fmt-prose" }, { task = "license" }]

[lint]
description = "prose lint + license check + evolve checks + plugin validate + fixture/installer checks"
run = [
  { task = "license-check" },
  { task = "lint-containers" },
  { task = "lint-shell" },
  { task = "lint-prose" },
  { task = "evolve-checks" },
  { task = "plugin-validate" },
  { task = "fixture-json" },
  { task = "installer-syntax" }
]

[test]
description = "validate the plugins and that eval results meet the minimum thresholds"
dir = "{{config_root}}"
tools = { "github:bitwise-media-group/evolve" = "{{vars.evolve_version}}" }
run = [
  "evolve run checks",
  "evolve report --check --junit=coverage/junit.xml --cobertura=coverage/cobertura-coverage.xml"
]

[triggers]
description = "tier 1 — trigger accuracy + token usage (new/modified)"
dir = "{{config_root}}"
tools = { "github:bitwise-media-group/evolve" = "{{vars.evolve_version}}" }
run = "evolve run triggers --new --modified"

[evals]
description = "tier 2 — behavioral evals + token usage (new/modified)"
dir = "{{config_root}}"
tools = { "github:bitwise-media-group/evolve" = "{{vars.evolve_version}}" }
run = "evolve run evals --new --modified"

[all]
description = "all eval tiers, then regenerate reports"
dir = "{{config_root}}"
tools = { "github:bitwise-media-group/evolve" = "{{vars.evolve_version}}" }
run = "evolve run all --new --modified"

[report]
description = "regenerate the EVALUATION files from stored results"
dir = "{{config_root}}"
tools = { "github:bitwise-media-group/evolve" = "{{vars.evolve_version}}" }
run = "evolve report"

[ci]
description = "the gates the reusable CI workflow runs"
run = [{ task = "lint" }, { task = "test" }]

[pr]
description = "full local gate before a pull request"
run = [{ task = "fmt" }, { task = "lint" }, { task = "test" }, { task = "commit" }]
